{% extends 'base.html' %}{% block content %}<div class="form-card"><h2>{{ title }}</h2><form method="post" enctype="multipart/form-data">{% csrf_token %}<div class="row">{% for field in form %}<div class="col-md-6 mb-3">{{ field.label_tag }}{{ field }}<small class="text-danger">{{ field.errors|striptags }}</small></div>{% endfor %}</div><button class="btn btn-primary">Save</button><a class="btn btn-light" href="javascript:history.back()">Cancel</a></form></div>{% endblock %}
