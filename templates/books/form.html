{% extends "base.html" %}

{% block content %}

<div class="form-card">

    <h2>{{ title }}</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row">

            {% for field in form %}
                <div class="col-md-6 mb-3">

                    {{ field.label_tag }}

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-danger mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}

                </div>
            {% endfor %}

        </div>

        <button type="submit" class="btn btn-primary">
            Save
        </button>

        <a href="javascript:history.back()" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
