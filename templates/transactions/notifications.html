{% extends 'base.html' %}{% block content %}<div class="page-head"><div><h1>Notifications</h1><p>Updates from your library.</p></div></div><div class="panel">{% for item in items %}<div class="note"><strong>{{ item.title }}</strong><span class="float-end text-muted small">{{ item.created_at|timesince }} ago</span><p class="mb-0">{{ item.body }}</p></div>{% empty %}<p class="text-muted">No notifications yet.</p>{% endfor %}</div>{% endblock %}
